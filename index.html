<!doctype html>
<html lang="pt-br" class="min-h-dvh bg-primary scroll-smooth">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bendito North</title>
    <link rel="stylesheet" href="src/css/input.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <script type="module" src="src/js/main.js"></script>
  </head>
  <body class="">
    <header class="px-[8%] bg-primary">
      <div id="header-wrapper" class="flex py-4 sm:py-6 relative items-center sm:justify-center">
        <img src="/bendito-logo.jpg" alt="" class="h-18 sm:h-20 lg:h-22">
        <button id="header-cta" class="text-text-primary bg-cta rounded-md absolute right-0 px-4 py-2 hover:scale-110 transition-all duration-150 ease-in-out font-[Nunito] font-bold text-sm sm:text-base md:text-lg active:bg-cta-dark active:scale-90">CONTATAR</button>
      </div>
    </header>
    <section id="hero-sec" class="flex justify-center items-center relative py-6 px-[8%] w-full max-h-200">
      <div id="blur" class="bg-[rgba(0,0,0,75%)] absolute inset-0"></div>
      <div id="hero-text-wrapper" class="flex flex-col md:gap-4 justify-center items-center z-10 text-center w-full">
        <h1 id="main-hero-text" class="font-[Bebas_Neue] text-6xl sm:text-8xl text-text-primary text-nowrap">BENDITO NORTH</h1>
        <h2 id="sec-hero-text" class="font-[Nunito] text-lg sm:text-2xl text-text-primary">Criatividade com direção, conexão e resultado.</h2>
      </div>
      <button id="know-more" class="absolute text-text-primary bg-cta bottom-4 md:bottom-14 px-6 py-3 sm:px-10 sm:py-5 rounded-lg flex overflow-hidden text-xl sm:text-3xl transition-all duration-150 font-[Nunito] hover:scale-110 ease-in-out active:bg-cta-dark active:scale-90">
        <a href="#present">
          <p id="arrow-down" class="-translate-y-48 -translate-x-1/2 top-1/2 left-1/2 absolute transition-transform duration-220">↓</p>
          <p id="know-more-text" class="transition-transform duration-220 tracking-wider font-bold">SAIBA MAIS</p>
        </a>
      </button>
    </section>
    <section id="present" class="bg-primary w-full py-12 flex flex-col items-center justify-center gap-6">
      <div id="present-text-wrapper">
        <h1 class="font-[Bebas_Neue] text-text-primary text-center text-4xl sm:text-6xl">O QUE É A BENDITO NORTH?</h1>
      </div>
      <iframe autoplay class="rounded-lg" width="560" height="315" src="https://www.youtube.com/embed/YKen3bvIZzM?si=e5LOG0g1TyTl2bdS" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>
    <section id="proposal-benefits"></section>
    <section id="testimonial"></section>
    <section></section>
  </body>
</html>
